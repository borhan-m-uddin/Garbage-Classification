<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garbage Classification AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1f2933;
            --muted: #52606d;
            --panel: rgba(255, 255, 255, 0.92);
            --accent: #0f766e;
            --accent-strong: #0a4b44;
            --accent-warm: #d97706;
            --line: rgba(31, 41, 51, 0.12);
            --shadow: 0 24px 60px rgba(15, 23, 42, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: "Space Grotesk", sans-serif;
            color: var(--ink);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background: radial-gradient(circle at top left, #f4efe6 0%, #e8f1ef 45%, #dfe8f2 100%);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 15% 20%, rgba(15, 118, 110, 0.15), transparent 45%),
                        radial-gradient(circle at 80% 10%, rgba(217, 119, 6, 0.18), transparent 45%),
                        radial-gradient(circle at 70% 80%, rgba(15, 118, 110, 0.12), transparent 55%);
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: repeating-linear-gradient(135deg, rgba(31, 41, 51, 0.04) 0, rgba(31, 41, 51, 0.04) 1px, transparent 1px, transparent 10px);
            z-index: -1;
        }

        .shell {
            width: 100%;
            max-width: 760px;
            background: var(--panel);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            animation: rise 0.8s ease-out;
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        .title {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--muted);
            font-size: 1rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: "DM Mono", monospace;
            font-size: 0.85rem;
            color: var(--accent-strong);
            background: rgba(15, 118, 110, 0.1);
            padding: 6px 12px;
            border-radius: 999px;
            width: fit-content;
        }

        .upload-area {
            border: 2px dashed rgba(15, 118, 110, 0.5);
            border-radius: 18px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255, 255, 255, 0.7);
        }

        .upload-area:hover {
            border-color: var(--accent);
            box-shadow: 0 12px 28px rgba(15, 118, 110, 0.18);
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: var(--accent-warm);
            background: rgba(255, 255, 255, 0.95);
        }

        .upload-icon {
            font-size: 2.4rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        input[type="file"] {
            display: none;
        }

        .upload-text {
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .upload-hint {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .loading {
            display: none;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            font-size: 1rem;
            color: var(--muted);
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(15, 118, 110, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .error {
            display: none;
            padding: 14px 18px;
            margin-top: 18px;
            background: rgba(220, 38, 38, 0.08);
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 12px;
            color: #991b1b;
        }

        .result {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.6s ease-out;
        }

        .result-image {
            width: 100%;
            border-radius: 14px;
            margin-bottom: 20px;
            box-shadow: 0 12px 30px rgba(31, 41, 51, 0.15);
        }

        .result-class {
            background: linear-gradient(135deg, rgba(15, 118, 110, 0.12), rgba(217, 119, 6, 0.12));
            border: 1px solid rgba(15, 118, 110, 0.18);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 18px;
        }

        .class-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .confidence {
            color: var(--muted);
            font-size: 1rem;
        }

        .probabilities {
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--line);
        }

        .prob-title {
            font-weight: 600;
            margin-bottom: 14px;
        }

        .prob-bar {
            margin-bottom: 14px;
        }

        .prob-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }

        .prob-name {
            font-weight: 500;
        }

        .prob-value {
            color: var(--accent-strong);
            font-weight: 600;
        }

        .prob-progress {
            width: 100%;
            height: 10px;
            background: rgba(15, 23, 42, 0.08);
            border-radius: 999px;
            overflow: hidden;
        }

        .prob-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-warm));
            transition: width 0.5s ease;
        }

        .btn-reset {
            margin-top: 20px;
            width: 100%;
            border: none;
            background: var(--accent);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-reset:hover {
            background: var(--accent-strong);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(15, 118, 110, 0.2);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .shell {
                padding: 26px;
            }

            .title {
                font-size: 1.8rem;
            }

            .upload-area {
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <header>
            <span class="badge">MODEL READY</span>
            <h1 class="title">Garbage Classification AI</h1>
            <p class="subtitle">Upload an image and get a class prediction with confidence scores.</p>
        </header>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">Upload</div>
            <p class="upload-text">Click or drag an image here</p>
            <p class="upload-hint">Supported: JPG, PNG, GIF, BMP. Max size 16MB.</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Classifying image...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <img class="result-image" id="resultImage" src="" alt="Uploaded image">

            <div class="result-class">
                <div class="class-name" id="className"></div>
                <div class="confidence" id="confidence"></div>
            </div>

            <div class="probabilities">
                <div class="prob-title">Prediction confidence</div>
                <div id="probsContainer"></div>
            </div>

            <button class="btn-reset" onclick="resetForm()">Classify another image</button>
        </div>
    </main>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const errorDiv = document.getElementById('error');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (event) => {
            event.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (event) => {
            event.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFile(event.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (event) => {
            handleFile(event.target.files[0]);
        });

        function handleFile(file) {
            if (!file) {
                return;
            }

            if (!['image/jpeg', 'image/png', 'image/gif', 'image/bmp'].includes(file.type)) {
                showError('Invalid file type. Please upload JPG, PNG, GIF, or BMP.');
                return;
            }

            if (file.size > 16 * 1024 * 1024) {
                showError('File too large. Maximum 16MB allowed.');
                return;
            }

            uploadAndPredict(file);
        }

        function uploadAndPredict(file) {
            const formData = new FormData();
            formData.append('image', file);

            loading.style.display = 'flex';
            result.style.display = 'none';
            errorDiv.style.display = 'none';

            fetch('/predict', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loading.style.display = 'none';

                if (data.success) {
                    displayResult(data);
                } else {
                    showError(data.error || 'Prediction failed.');
                }
            })
            .catch(error => {
                loading.style.display = 'none';
                showError('Error: ' + error.message);
            });
        }

        function displayResult(data) {
            document.getElementById('resultImage').src = data.image;
            document.getElementById('className').textContent = data.class;
            document.getElementById('confidence').textContent = `Confidence: ${data.confidence}`;

            const probsContainer = document.getElementById('probsContainer');
            probsContainer.innerHTML = '';

            const sorted = Object.entries(data.probabilities)
                .sort((a, b) => b[1] - a[1]);

            sorted.forEach(([className, prob]) => {
                const percentage = (prob * 100).toFixed(1);
                const bar = document.createElement('div');
                bar.className = 'prob-bar';
                bar.innerHTML = `
                    <div class="prob-label">
                        <span class="prob-name">${className}</span>
                        <span class="prob-value">${percentage}%</span>
                    </div>
                    <div class="prob-progress">
                        <div class="prob-fill" style="width: ${percentage}%"></div>
                    </div>
                `;
                probsContainer.appendChild(bar);
            });

            result.style.display = 'block';
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function resetForm() {
            fileInput.value = '';
            result.style.display = 'none';
            errorDiv.style.display = 'none';
            uploadArea.classList.remove('dragover');
        }
    </script>
</body>
</html>
